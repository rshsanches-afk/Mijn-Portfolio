<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ranisha Sanches | Contact</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/contact.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <nav class="navbar">
        <div class="logo">RS.</div>
        <div class="nav-links">
            <a href="index.html#home">Home</a>
            <a href="index.html#about">Over Mij</a>
            <a href="work.html">Projecten</a>
            <a href="index.html#skills">Skills</a>
            <a href="contact.html">Contact</a>
            <a href="menu.html" class="btn-terug">Menu Bord</a>
        </div>
    </nav>

    <section id="contact" class="contact">
        <div class="section-container">
            <h2 class="section-title">Neem Contact Op</h2>
            <div class="contact-layout">
                <div class="contact-info">
                    <div class="stat-card contact-card">
                        <h3>📞 Telefoon</h3>
                        <p><a href="tel:+5977651074">+597 7651074</a></p>
                    </div>
                    <div class="stat-card contact-card">
                        <h3>✉️ E-mailadres</h3>
                        <p><a href="mailto:rshsanches@gmail.com">rshsanches@gmail.com</a></p>
                    </div>
                    <div class="stat-card contact-card">
                        <h3>🔗 Socials</h3>
                        <p>
                            <a href="#" class="social-link">LinkedIn</a> | 
                            <a href="#" class="social-link">GitHub</a>
                        </p>
                    </div>
                </div>
                
                <div class="contact-form-container">
                    <form class="contact-form" action="#" method="POST">
                        <h3>Stuur een bericht</h3>
                        <div class="form-group">
                            <label for="name">Naam</label>
                            <input type="text" id="name" name="name" required placeholder="Jouw naam">
                        </div>
                        <div class="form-group">
                            <label for="email">E-mailadres</label>
                            <input type="email" id="email" name="email" required placeholder="Jouw e-mailadres">
                        </div>
                        <div class="form-group">
                            <label for="message">Bericht</label>
                            <textarea id="message" name="message" rows="5" required placeholder="Typ hier je bericht..."></textarea>
                        </div>
                        <button type="submit" class="btn btn-submit">Verstuur Bericht</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Ranisha Sanches. Gemaakt met passie en doorzettingsvermogen.</p>
    </footer>

</body>
</html>
